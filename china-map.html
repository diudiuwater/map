                    "geometry": {

                    }
                },
                {
                    "type": "Feature",
                    "properties": {"name": "辽宁"},
                    "geometry": {
                        "type": "Polygon",
                        "coordinates": [[[118.5, 38.5], [126.0, 38.5], [126.0, 43.5], [118.5, 43.5], [118.5, 38.5]]]
                    }
                }
            ]
        };

        // 注册地图
        echarts.registerMap('china', chinaGeoJSON);

        const chart = echarts.init(document.getElementById('map-container'));

        // 主要城市坐标
        const cities = [
            {name: '北京', value: [116.4, 39.9]},
            {name: '上海', value: [121.5, 31.2]},
            {name: '广州', value: [113.3, 23.1]},
            {name: '深圳', value: [114.1, 22.5]},
            {name: '成都', value: [104.1, 30.7]},
            {name: '武汉', value: [114.3, 30.6]},
            {name: '西安', value: [108.9, 34.3]},
            {name: '杭州', value: [120.2, 30.3]},
            {name: '南京', value: [118.8, 32.1]},
            {name: '重庆', value: [106.5, 29.6]},
            {name: '天津', value: [117.2, 39.1]},
            {name: '沈阳', value: [123.4, 41.8]},
            {name: '哈尔滨', value: [126.6, 45.8]},
            {name: '乌鲁木齐', value: [87.6, 43.8]},
            {name: '拉萨', value: [91.1, 29.7]},
            {name: '昆明', value: [102.7, 25.0]},
            {name: '兰州', value: [103.8, 36.1]},
            {name: '郑州', value: [113.6, 34.8]},
            {name: '长沙', value: [112.9, 28.2]},
            {name: '福州', value: [119.3, 26.1]}
        ];

        // 生成光纤连接线
        const fiberLines = [];
        const centerCity = cities[0]; // 北京为中心
        
        cities.forEach((city, index) => {
            if (index > 0) {
                fiberLines.push({
                    coords: [centerCity.value, city.value],
                    lineStyle: {
                        color: '#00ffff',
                        width: 1,
                        opacity: 0.6,
                        curveness: 0.2
                    }
                });
            }
        });

        // 添加城市间交叉连接
        for (let i = 1; i < cities.length; i++) {
            for (let j = i + 1; j < cities.length; j++) {
                if (Math.random() > 0.85) {
                    fiberLines.push({
                        coords: [cities[i].value, cities[j].value],
                        lineStyle: {
                            color: '#00ff88',
                            width: 0.5,
                            opacity: 0.3,
                            curveness: 0.3
                        }
                    });
                }
            }
        }

        const option = {
            backgroundColor: '#000510',
            geo: {
                map: 'china',
                roam: true,
                zoom: 1.2,
                center: [105, 36],
                label: {
                    show: false
                },
                itemStyle: {
                    areaColor: {
                        type: 'linear',
                        x: 0,
                        y: 0,
                        x2: 0,
                        y2: 1,
                        colorStops: [{
                            offset: 0, color: '#0a1a3a'
                        }, {
                            offset: 1, color: '#051020'
                        }]
                    },
                    borderColor: '#00aaff',
                    borderWidth: 1.5,
                    shadowColor: 'rgba(0, 170, 255, 0.5)',
                    shadowBlur: 20
                },
                emphasis: {
                    itemStyle: {
                        areaColor: '#1a3a6a',
                        borderColor: '#00ffff',
                        borderWidth: 2,
                        shadowColor: 'rgba(0, 255, 255, 0.8)',
                        shadowBlur: 30
                    }
                }
            },
            series: [
                // 光纤流动线条
                {
                    type: 'lines',
                    zlevel: 2,
                    effect: {
                        show: true,
                        period: 3,
                        trailLength: 0.7,
                        color: '#00ffff',
                        symbol: 'arrow',
                        symbolSize: 6
                    },
                    lineStyle: {
                        color: '#00ffff',
                        width: 1,
                        opacity: 0.4,
                        curveness: 0.2,
                        type: 'solid'
                    },
                    data: fiberLines
                },
                // 反向流动线条
                {
                    type: 'lines',
                    zlevel: 2,
                    effect: {
                        show: true,
                        period: 4,
                        trailLength: 0.5,
                        color: '#ff00ff',
                        symbol: 'arrow',
                        symbolSize: 4
                    },
                    lineStyle: {
                        color: '#ff00ff',
                        width: 0.8,
                        opacity: 0.3,
                        curveness: -0.2,
                        type: 'solid'
                    },
                    data: fiberLines.map(line => ({
                        coords: [line.coords[1], line.coords[0]],
                        lineStyle: line.lineStyle
                    }))
                },
                // 城市节点
                {
                    type: 'effectScatter',
                    coordinateSystem: 'geo',
                    zlevel: 3,
                    rippleEffect: {
                        brushType: 'stroke',
                        scale: 4,
                        period: 4
                    },
                    label: {
                        show: false
                    },
                    symbolSize: 8,
                    itemStyle: {
                        color: '#00ffff',
                        shadowBlur: 20,
                        shadowColor: '#00ffff'
                    },
                    data: cities
                },
                // 核心节点（更大更亮）
                {
                    type: 'effectScatter',
                    coordinateSystem: 'geo',
                    zlevel: 4,
                    rippleEffect: {
                        brushType: 'fill',
                        scale: 6,
                        period: 3
                    },
                    symbolSize: 15,
                    itemStyle: {
                        color: '#ff6600',
                        shadowBlur: 30,
                        shadowColor: '#ff6600'
                    },
                    data: [cities[0], cities[1], cities[2], cities[3]]
                }
            ]
        };

        chart.setOption(option);

        // 响应窗口大小变化
        window.addEventListener('resize', () => {
            chart.resize();
        });

        // 动态更新效果
        setInterval(() => {
            const newLines = fiberLines.map(line => ({
                ...line,
                lineStyle: {
                    ...line.lineStyle,
                    opacity: 0.3 + Math.random() * 0.4
                }
            }));
            
            chart.setOption({
                series: [{
                    data: newLines
                }]
            });
        }, 2000);
    </script>
</body>
</html>
